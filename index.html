<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billiards Shot Simulator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;color:#eee;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:16px 8px;}
h1{font-size:15px;font-weight:600;color:#aaa;letter-spacing:0.04em;margin-bottom:10px;}
#outer{display:flex;gap:16px;align-items:flex-start;width:960px;max-width:100%;}
#sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;}
#msg-card{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:14px;min-height:120px;}
#msg-title{font-size:13px;font-weight:700;color:#ddd;margin-bottom:8px;line-height:1.4;}
#msg-body{font-size:12px;color:#999;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
#msg-updated{font-size:10px;color:#444;margin-top:10px;}
#edit-btn{width:100%;padding:7px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#666;cursor:pointer;font-size:11px;}
#edit-btn:hover{border-color:#555;color:#aaa;}
#edit-panel{display:none;background:#1a1a1a;border:1px solid #444;border-radius:10px;padding:14px;flex-direction:column;gap:8px;}
#edit-panel input,#edit-panel textarea{background:#111;border:1px solid #444;border-radius:6px;color:#eee;padding:7px 9px;font-size:12px;font-family:inherit;width:100%;outline:none;resize:vertical;}
#edit-panel input:focus,#edit-panel textarea:focus{border-color:#378add;}
#edit-panel textarea{min-height:120px;}
#edit-panel input[type=password]{letter-spacing:0.1em;}
#save-btn{padding:7px;border-radius:8px;border:none;background:#185fa5;color:#fff;cursor:pointer;font-size:12px;font-weight:600;}
#save-btn:hover{background:#1070b8;}
#save-msg{font-size:11px;text-align:center;min-height:14px;}
#app{display:flex;flex-direction:column;gap:10px;width:680px;max-width:100%;}
@media(max-width:920px){#outer{flex-direction:column;width:100%;align-items:center;}#sidebar{width:100%;max-width:680px;flex-direction:row;flex-wrap:wrap;}#msg-card{flex:1;min-width:200px;}#edit-panel{width:100%;}}
#toolbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.btn{padding:5px 12px;border-radius:8px;border:0.5px solid #666;background:#2a2a2a;color:#eee;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;}
.btn:hover{background:#333;}.btn.active{background:#1a3a5c;border-color:#378add;color:#7ab8f5;}
.btn.shoot{background:#185fa5;color:#fff;border-color:transparent;}.btn.shoot:hover{background:#1070b8;}
.btn.replay{background:#2a2a2a;color:#a78bfa;border-color:#6d4aaa;}.btn.replay:hover{background:#1e1030;}
.btn.replay:disabled{color:#555;border-color:#444;cursor:default;background:#2a2a2a;}
.btn.resetbtn{color:#aaa;}
label{font-size:12px;color:#aaa;}
input[type=range]{accent-color:#378add;}
#canvas-wrap{border-radius:10px;overflow:hidden;border:2px solid #2d5a1b;}
canvas{display:block;}
#view3d-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
#view3d-toolbar input[type=range]{width:140px;}
#zoom3d-display{font-size:12px;font-weight:600;color:#eee;min-width:28px;}
#view3d-wrap{border-radius:10px;overflow:hidden;border:2px solid #444;width:680px;height:300px;position:relative;background:#0a0a0a;}
#view3d-label{position:absolute;top:6px;left:8px;font-size:10px;color:rgba(255,255,255,0.45);font-weight:500;letter-spacing:0.02em;z-index:2;pointer-events:none;}
#status-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
#status{font-size:12px;color:#999;min-height:18px;}
#visitor-count{font-size:11px;color:#555;white-space:nowrap;}
#spin-wrap{display:flex;align-items:center;gap:5px;}
#spin-pad{border-radius:50%;cursor:crosshair;display:block;}
.spin-label{font-size:11px;color:#888;min-width:65px;}
#cut-info{font-size:12px;color:#f5c518;font-weight:500;min-width:70px;}
#power-display{font-size:13px;font-weight:600;color:#eee;min-width:42px;text-align:right;}
.cam-btn{padding:4px 10px;border-radius:6px;border:0.5px solid #555;background:#222;color:#bbb;cursor:pointer;font-size:11px;}
.cam-btn.active{background:#1a3a5c;border-color:#378add;color:#7ab8f5;}
#space-hint{font-size:11px;color:#555;white-space:nowrap;}
</style>
</head><body>
<h1>BILLIARDS SHOT SIMULATOR</h1>
<div id="outer">
  <!-- Left sidebar: message board -->
  <div id="sidebar">
    <div id="msg-card">
      <div id="msg-title">Loading…</div>
      <div id="msg-body"></div>
      <div id="msg-updated"></div>
    </div>
    <button id="edit-btn">✏️ Edit message</button>
    <div id="edit-panel">
      <input id="edit-title" type="text" placeholder="Title" maxlength="80">
      <textarea id="edit-body" placeholder="Message body (supports line breaks)"></textarea>
      <input id="edit-pass" type="password" placeholder="Admin password">
      <button id="save-btn">Save</button>
      <div id="save-msg"></div>
    </div>
  </div>
  <!-- Main game -->
  <div id="app">
  <div id="toolbar">
    <button class="btn" id="btnCB">Move CB</button>
    <button class="btn" id="btnOB">Move OB</button>
    <button class="btn active" id="btnAim">Aim shot</button>
    <div style="width:1px;height:18px;background:#444;margin:0 1px"></div>
    <label>Power</label>
    <input type="range" id="power" min="1" max="100" value="50" step="1" style="width:80px">
    <span id="power-display">50%</span>
    <div id="spin-wrap">
      <label>Spin</label>
      <canvas id="spin-pad" width="40" height="40" title="Double-click to reset spin to center"></canvas>
      <span class="spin-label" id="spinLabel">Center</span>
    </div>
    <span id="cut-info">Cut: 0°</span>
    <button class="btn shoot" id="btnShoot">Shoot</button>
    <button class="btn replay" id="btnReplay" disabled>↩ Replay</button>
    <button class="btn resetbtn" id="btnReset">Reset</button>
    <span id="space-hint">Space = shoot</span>
  </div>
  <div id="canvas-wrap"><canvas id="main" width="680" height="400"></canvas></div>
  <div id="view3d-toolbar">
    <button class="cam-btn active" id="btnCueEye">Cue-eye</button>
    <button class="cam-btn" id="btnOrbit">Free orbit</button>
    <div id="cue-eye-controls" style="display:flex;align-items:center;gap:8px;">
      <label>Distance</label>
      <input type="range" id="zoom3d" min="30" max="220" value="62" step="1">
      <span id="zoom3d-display">62</span>
    </div>
    <span id="orbit-hint" style="display:none;font-size:11px;color:#666;">Drag to rotate · Scroll or pinch to zoom</span>
  </div>
  <div id="view3d-wrap"><div id="view3d-label">Cue-eye view</div></div>
  <div id="status-row">
    <div id="status">Drag the ghost ball to aim. Press Space to shoot.</div>
    <span id="visitor-count">👁 —</span>
  </div>
</div><!-- #app -->
</div><!-- #outer -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Visitor counter
fetch('/api/visit')

// ── Message board ────────────────────────────────────────────────────────────
const msgTitle   = document.getElementById('msg-title');
const msgBody    = document.getElementById('msg-body');
const msgUpdated = document.getElementById('msg-updated');
const editBtn    = document.getElementById('edit-btn');
const editPanel  = document.getElementById('edit-panel');
const editTitleEl= document.getElementById('edit-title');
const editBodyEl = document.getElementById('edit-body');
const editPass   = document.getElementById('edit-pass');
const saveBtn    = document.getElementById('save-btn');
const saveMsgEl  = document.getElementById('save-msg');

function loadMessage(){
  fetch('/api/message')
    .then(r=>r.json())
    .then(d=>{
      msgTitle.textContent = d.title || '';
      msgBody.textContent  = d.body  || '';
      msgUpdated.textContent = d.updated
        ? 'Updated '+new Date(d.updated).toLocaleDateString()
        : '';
    })
    .catch(()=>{ msgTitle.textContent='Welcome!'; msgBody.textContent='Drag the ghost ball to aim. Press Space to shoot.'; });
}
loadMessage();

editBtn.addEventListener('click',()=>{
  const open = editPanel.style.display==='flex';
  editPanel.style.display = open ? 'none' : 'flex';
  editBtn.textContent = open ? '✏️ Edit message' : '✖ Cancel';
  if(!open){
    // Pre-fill with current content
    editTitleEl.value = msgTitle.textContent;
    editBodyEl.value  = msgBody.textContent;
    editPass.value    = '';
    saveMsgEl.textContent = '';
  }
});

saveBtn.addEventListener('click',()=>{
  const title    = editTitleEl.value.trim();
  const body     = editBodyEl.value.trim();
  const password = editPass.value;
  if(!title||!body){ saveMsgEl.style.color='#f55'; saveMsgEl.textContent='Title and body required.'; return; }
  if(!password)    { saveMsgEl.style.color='#f55'; saveMsgEl.textContent='Password required.'; return; }
  saveBtn.disabled=true; saveMsgEl.style.color='#aaa'; saveMsgEl.textContent='Saving…';
  fetch('/api/message',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({title,body,password})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.ok){
      saveMsgEl.style.color='#4caf50'; saveMsgEl.textContent='Saved!';
      loadMessage();
      setTimeout(()=>{
        editPanel.style.display='none';
        editBtn.textContent='✏️ Edit message';
      },1200);
    } else {
      saveMsgEl.style.color='#f55';
      saveMsgEl.textContent = d.error==='Unauthorized' ? 'Wrong password.' : (d.error||'Error saving.');
    }
  })
  .catch(()=>{ saveMsgEl.style.color='#f55'; saveMsgEl.textContent='Network error.'; })
  .finally(()=>{ saveBtn.disabled=false; });
});

// original visitor counter fetch.then(r=>r.json()).then(({count})=>{
  if(count!=null)document.getElementById('visitor-count').textContent='👁 '+count.toLocaleString()+' visits';
}).catch(()=>{});

const canvas=document.getElementById('main'),ctx=canvas.getContext('2d');
const spinPad=document.getElementById('spin-pad'),sCtx=spinPad.getContext('2d');
const W=680,H=400,TP=40,TW=W-TP*2,TH=H-TP*2,PR=14,BR=11;
const pockets=[{x:TP,y:TP},{x:TP+TW/2,y:TP},{x:TP+TW,y:TP},{x:TP,y:TP+TH},{x:TP+TW/2,y:TP+TH},{x:TP+TW,y:TP+TH}];
const ICB={x:TP+TW*0.25,y:TP+TH*0.5},IOB={x:TP+TW*0.65,y:TP+TH*0.5};

let s={cb:{...ICB},ob:{...IOB},cbPos:{...ICB},obPos:{...IOB},cbVel:{x:0,y:0},obVel:{x:0,y:0},cbAngle:0,obAngle:0,cbPocketed:false,obPocketed:false,mode:'aim',animating:false,spinX:0,spinY:0,trails:[],obTrails:[],aimAngle:0,cam3DDist:62,cueStrikeAnim:0};
s.aimAngle=Math.atan2(IOB.y-ICB.y,IOB.x-ICB.x);
let snapshot=null,animGen=0,rafHandle=null,camMode='cue-eye',_trajPts=[];

function ghostPos(){return{x:s.ob.x-Math.cos(s.aimAngle)*BR*2,y:s.ob.y-Math.sin(s.aimAngle)*BR*2};}
function cbToGhostAngle(){const g=ghostPos();return Math.atan2(g.y-s.cb.y,g.x-s.cb.x);}
function cutAngleDeg(){const a=Math.atan2(s.ob.y-s.cb.y,s.ob.x-s.cb.x);let d=s.aimAngle-a;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;return Math.min(90,Math.abs(d)*180/Math.PI);}
function cbDeflectAngle(){const sd=cbToGhostAngle(),nx=Math.cos(s.aimAngle),ny=Math.sin(s.aimAngle),vx=Math.cos(sd),vy=Math.sin(sd),vn=vx*nx+vy*ny,tx=vx-nx*vn,ty=vy-ny*vn,tl=Math.sqrt(tx*tx+ty*ty);if(tl<0.001)return sd+Math.PI/2;return Math.atan2(ty/tl,tx/tl)+s.spinY*0.45;}
function trajMaxDist(){return(parseInt(power$.value)/100)*2000;}
function computeTraj(sx,sy,dir,mb,md){
  const pts=[{x:sx,y:sy}];let x=sx,y=sy,dx=Math.cos(dir),dy=Math.sin(dir),rem=md;
  for(let b=0;b<=mb;b++){
    const walls=[];
    if(dx>0)walls.push({t:(TP+TW-BR-x)/dx,nx:-1,ny:0});if(dx<0)walls.push({t:(TP+BR-x)/dx,nx:1,ny:0});
    if(dy>0)walls.push({t:(TP+TH-BR-y)/dy,nx:0,ny:-1});if(dy<0)walls.push({t:(TP+BR-y)/dy,nx:0,ny:1});
    const ocx=s.ob.x-x,ocy=s.ob.y-y,tca=ocx*dx+ocy*dy,d2=ocx*ocx+ocy*ocy-tca*tca,r2=(BR*2)**2;
    let tOB=Infinity;if(d2<=r2&&tca>0)tOB=tca-Math.sqrt(r2-d2);
    walls.sort((a,b2)=>a.t-b2.t);const nw=walls.find(w=>w.t>0.5);if(!nw)break;
    const tStop=Math.min(nw.t,tOB,rem);x+=dx*tStop;y+=dy*tStop;pts.push({x,y});rem-=tStop;
    if(rem<=0||tStop===tOB)break;const dot=dx*nw.nx+dy*nw.ny;dx-=2*dot*nw.nx;dy-=2*dot*nw.ny;
  }
  return pts;
}

const power$=document.getElementById('power'),powerDisplay=document.getElementById('power-display');
const statusEl=document.getElementById('status'),spinLabelEl=document.getElementById('spinLabel'),cutInfo=document.getElementById('cut-info');
const btnCB=document.getElementById('btnCB'),btnOB=document.getElementById('btnOB'),btnAim=document.getElementById('btnAim');
const btnShoot=document.getElementById('btnShoot'),btnReplay=document.getElementById('btnReplay'),btnReset=document.getElementById('btnReset');
const zoom3d$=document.getElementById('zoom3d'),zoom3dDisplay=document.getElementById('zoom3d-display');
const btnCueEye=document.getElementById('btnCueEye'),btnOrbit=document.getElementById('btnOrbit');
const cueEyeControls=document.getElementById('cue-eye-controls'),orbitHint=document.getElementById('orbit-hint'),view3dLabel=document.getElementById('view3d-label');

power$.oninput=()=>{powerDisplay.textContent=power$.value+'%';if(!s.animating)drawScene();};
zoom3d$.oninput=()=>{s.cam3DDist=parseInt(zoom3d$.value);zoom3dDisplay.textContent=zoom3d$.value;sync3D();};
btnCueEye.onclick=()=>{camMode='cue-eye';btnCueEye.classList.add('active');btnOrbit.classList.remove('active');cueEyeControls.style.display='flex';orbitHint.style.display='none';view3dLabel.textContent='Cue-eye view';sync3D();};
btnOrbit.onclick=()=>{camMode='orbit';btnOrbit.classList.add('active');btnCueEye.classList.remove('active');cueEyeControls.style.display='none';orbitHint.style.display='';view3dLabel.textContent='Free orbit';sync3D();};
function setMode(m,msg){s.mode=m;btnCB.classList.toggle('active',m==='cb');btnOB.classList.toggle('active',m==='ob');btnAim.classList.toggle('active',m==='aim');statusEl.textContent=msg!==undefined?msg:({cb:'Drag to place the cue ball.',ob:'Drag to place the object ball.',aim:'Drag ghost ball to aim. Press Space to shoot.'}[m]||'');}
btnCB.onclick=()=>{if(s.animating)return;setMode(s.mode==='cb'?'aim':'cb');};
btnOB.onclick=()=>{if(s.animating)return;setMode(s.mode==='ob'?'aim':'ob');};
btnAim.onclick=()=>{if(s.animating)return;setMode('aim');};
window.addEventListener('keydown',e=>{if(e.code==='Space'){const tag=(document.activeElement||{}).tagName||'';if(tag==='INPUT'||tag==='TEXTAREA'||tag==='BUTTON')return;e.preventDefault();doShoot();}});

function updateSpinLabel(){const l=[];if(Math.abs(s.spinY)>0.15)l.push(s.spinY<0?'topspin':'backspin');if(Math.abs(s.spinX)>0.15)l.push(s.spinX<0?'left':'right');spinLabelEl.textContent=l.length?l.join('+'):'center';}
function drawSpinPad(){sCtx.clearRect(0,0,40,40);sCtx.fillStyle='#2a6e1a';sCtx.beginPath();sCtx.arc(20,20,18,0,Math.PI*2);sCtx.fill();sCtx.strokeStyle='rgba(255,255,255,0.12)';sCtx.lineWidth=0.5;sCtx.beginPath();sCtx.moveTo(20,2);sCtx.lineTo(20,38);sCtx.stroke();sCtx.beginPath();sCtx.moveTo(2,20);sCtx.lineTo(38,20);sCtx.stroke();sCtx.strokeStyle='rgba(255,255,255,0.2)';sCtx.lineWidth=0.5;sCtx.beginPath();sCtx.arc(20,20,18,0,Math.PI*2);sCtx.stroke();const sx=20+s.spinX*12,sy=20+s.spinY*12;sCtx.fillStyle='rgba(255,255,255,0.85)';sCtx.beginPath();sCtx.arc(sx,sy,4.5,0,Math.PI*2);sCtx.fill();sCtx.fillStyle='#185fa5';sCtx.beginPath();sCtx.arc(sx,sy,3,0,Math.PI*2);sCtx.fill();}
drawSpinPad();
function startSpinDrag(e){
  if(s.animating)return;
  if(e.touches)e.preventDefault();
  const r=spinPad.getBoundingClientRect();
  function set(ev){
    const src=ev.touches?ev.touches[0]:ev;
    let dx=(src.clientX-r.left-20)/12,dy=(src.clientY-r.top-20)/12;
    const m=Math.sqrt(dx*dx+dy*dy);if(m>1){dx/=m;dy/=m;}
    s.spinX=Math.round(dx*10)/10;s.spinY=Math.round(dy*10)/10;
    updateSpinLabel();drawSpinPad();if(!s.animating)drawScene();
  }
  set(e);
  const up=()=>{
    document.removeEventListener('mousemove',set);document.removeEventListener('mouseup',up);
    document.removeEventListener('touchmove',set);document.removeEventListener('touchend',up);
  };
  document.addEventListener('mousemove',set);document.addEventListener('mouseup',up);
  document.addEventListener('touchmove',set,{passive:false});document.addEventListener('touchend',up);
}
spinPad.addEventListener('mousedown',startSpinDrag);
spinPad.addEventListener('touchstart',startSpinDrag,{passive:false});
let lastSpinTap=0;
spinPad.addEventListener('touchend',e=>{
  const now=Date.now();
  if(now-lastSpinTap<300){e.preventDefault();s.spinX=0;s.spinY=0;updateSpinLabel();drawSpinPad();drawScene();}
  lastSpinTap=now;
});
spinPad.addEventListener('dblclick',e=>{if(s.animating)return;e.preventDefault();e.stopPropagation();s.spinX=0;s.spinY=0;updateSpinLabel();drawSpinPad();drawScene();});

function lighten(h,a){const n=parseInt(h.slice(1),16);return `rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&0xff)+a)},${Math.min(255,(n&0xff)+a)})`;}
function darken(h,a){const n=parseInt(h.slice(1),16);return `rgb(${Math.max(0,(n>>16)-a)},${Math.max(0,((n>>8)&0xff)-a)},${Math.max(0,(n&0xff)-a)})`;}

function drawTable(){ctx.fillStyle='#1a5c0e';ctx.fillRect(TP-18,TP-18,TW+36,TH+36);ctx.fillStyle='#2d7a1e';ctx.fillRect(TP,TP,TW,TH);ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;for(let i=1;i<6;i++){ctx.beginPath();ctx.moveTo(TP+TW/6*i,TP);ctx.lineTo(TP+TW/6*i,TP+TH);ctx.stroke();}pockets.forEach(p=>{ctx.fillStyle='#080808';ctx.beginPath();ctx.arc(p.x,p.y,PR,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.beginPath();ctx.arc(p.x,p.y,PR,0,Math.PI*2);ctx.stroke();});ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=2;ctx.strokeRect(TP,TP,TW,TH);}

  const felt=new THREE.Mesh(new THREE.PlaneGeometry(TW,TH),new THREE.MeshStandardMaterial({color:0x2d7a1e,roughness:.95}));felt.rotation.x=-Math.PI/2;scene3D.add(felt);
  const rm=new THREE.MeshStandardMaterial({color:0x1a5c0e,roughness:.85}),rt=20;
  [[TW+rt*2,rt,0,-(TH/2+rt/2)],[TW+rt*2,rt,0,(TH/2+rt/2)],[rt,TH,-(TW/2+rt/2),0],[rt,TH,(TW/2+rt/2),0]].forEach(([lx,lz,px,pz])=>{const m=new THREE.Mesh(new THREE.BoxGeometry(lx,10,lz),rm);m.position.set(px,TABLE_Y+4,pz);scene3D.add(m);});
  const pm=new THREE.MeshStandardMaterial({color:0x080808,roughness:1});
  pockets.forEach(p=>{const m=new THREE.Mesh(new THREE.CylinderGeometry(PR,PR*.85,14,20),pm);const w3=to3D(p.x,p.y);m.position.set(w3.x,TABLE_Y-4,w3.z);scene3D.add(m);});
  cbMesh=new THREE.Mesh(new THREE.SphereGeometry(BALL_RADIUS_3D,32,32),new THREE.MeshStandardMaterial({map:makeSpottedCBTex(),roughness:.35,metalness:.04}));cbMesh.position.y=TABLE_Y+BALL_RADIUS_3D;scene3D.add(cbMesh);
  obMesh=new THREE.Mesh(new THREE.SphereGeometry(BALL_RADIUS_3D,32,32),new THREE.MeshStandardMaterial({color:0xf5c518,roughness:.3,metalness:.05}));obMesh.position.y=TABLE_Y+BALL_RADIUS_3D;scene3D.add(obMesh);
  obMesh.add(new THREE.Mesh(new THREE.CylinderGeometry(BALL_RADIUS_3D*1.001,BALL_RADIUS_3D*1.001,BALL_RADIUS_3D*.65,32,1,true),new THREE.MeshStandardMaterial({color:0xb41414,side:THREE.DoubleSide})));
  ghostMesh=new THREE.Mesh(new THREE.SphereGeometry(BALL_RADIUS_3D,20,20),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.16}));ghostMesh.position.y=TABLE_Y+BALL_RADIUS_3D;scene3D.add(ghostMesh);
  ghostMesh.add(new THREE.Mesh(new THREE.SphereGeometry(BALL_RADIUS_3D+.3,16,16),new THREE.MeshBasicMaterial({color:0xffffff,wireframe:true,transparent:true,opacity:.3})));
  aimLineMesh=new THREE.Line(new THREE.BufferGeometry(),new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.55}));scene3D.add(aimLineMesh);
  const rc=renderer3D.domElement;
  // Mouse orbit
  rc.addEventListener('mousedown',e=>{if(camMode!=='orbit')return;orbit.dragging=true;orbit.lastX=e.clientX;orbit.lastY=e.clientY;rc.style.cursor='grabbing';});
  window.addEventListener('mousemove',e=>{if(!orbit.dragging)return;orbit.theta-=(e.clientX-orbit.lastX)*.008;orbit.phi=Math.max(.08,Math.min(Math.PI/2-.02,orbit.phi+(e.clientY-orbit.lastY)*.008));orbit.lastX=e.clientX;orbit.lastY=e.clientY;sync3D();});
  window.addEventListener('mouseup',()=>{orbit.dragging=false;rc.style.cursor=camMode==='orbit'?'grab':'default';});
  rc.addEventListener('wheel',e=>{if(camMode!=='orbit')return;e.preventDefault();orbit.radius=Math.max(80,Math.min(1200,orbit.radius+e.deltaY*.6));sync3D();},{passive:false});

  // Touch orbit — single finger to rotate, two-finger pinch to zoom
  let orbitTouchPinchDist=null;
  rc.addEventListener('touchstart',e=>{
    if(camMode!=='orbit')return;
    e.preventDefault();
    if(e.touches.length===1){
      orbit.dragging=true;
      orbit.lastX=e.touches[0].clientX;
      orbit.lastY=e.touches[0].clientY;
    } else if(e.touches.length===2){
      orbit.dragging=false;
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      orbitTouchPinchDist=Math.sqrt(dx*dx+dy*dy);
    }
  },{passive:false});
  rc.addEventListener('touchmove',e=>{
    if(camMode!=='orbit')return;
    e.preventDefault();
    if(e.touches.length===1&&orbit.dragging){
      orbit.theta-=(e.touches[0].clientX-orbit.lastX)*.01;
      orbit.phi=Math.max(.08,Math.min(Math.PI/2-.02,orbit.phi+(e.touches[0].clientY-orbit.lastY)*.01));
      orbit.lastX=e.touches[0].clientX;
      orbit.lastY=e.touches[0].clientY;
      sync3D();
    } else if(e.touches.length===2&&orbitTouchPinchDist!==null){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      orbit.radius=Math.max(80,Math.min(1200,orbit.radius-(dist-orbitTouchPinchDist)*1.5));
      orbitTouchPinchDist=dist;
      sync3D();
    }
  },{passive:false});
  rc.addEventListener('touchend',e=>{
    if(e.touches.length===0){orbit.dragging=false;orbitTouchPinchDist=null;}
    else if(e.touches.length===1){
      // went from 2-finger pinch back to 1-finger — resume rotate
      orbit.dragging=true;
      orbit.lastX=e.touches[0].clientX;
      orbit.lastY=e.touches[0].clientY;
      orbitTouchPinchDist=null;
    }
  });
  view3DReady=true;
}

function sync3D(){
  if(!view3DReady)return;
  const cbx=s.animating?s.cbPos.x:s.cb.x,cby=s.animating?s.cbPos.y:s.cb.y;
  const obx=s.animating?s.obPos.x:s.ob.x,oby=s.animating?s.obPos.y:s.ob.y;
  const cb3=to3D(cbx,cby),ob3=to3D(obx,oby);
  cbMesh.position.x=cb3.x;cbMesh.position.z=cb3.z;cbMesh.visible=!s.cbPocketed;cbMesh.rotation.z=s.cbAngle;
  obMesh.position.x=ob3.x;obMesh.position.z=ob3.z;obMesh.visible=!s.obPocketed;obMesh.rotation.z=s.obAngle;
  const g=ghostPos(),g3=to3D(g.x,g.y);
  ghostMesh.position.x=g3.x;ghostMesh.position.z=g3.z;ghostMesh.visible=!s.animating&&!s.cbPocketed&&!s.obPocketed;
  if(!s.animating&&!s.cbPocketed&&!s.obPocketed){aimLineMesh.geometry.setFromPoints([new THREE.Vector3(cb3.x,TABLE_Y+1,cb3.z),new THREE.Vector3(g3.x,TABLE_Y+1,g3.z)]);aimLineMesh.visible=true;updateTrajLines(_trajPts.length?_trajPts:computeTraj(cbx,cby,cbToGhostAngle(),3,trajMaxDist()));}
  else{aimLineMesh.visible=false;updateTrajLines(null);}
  const shotAngle=s.animating?(Math.atan2(s.cbVel.y,s.cbVel.x)||cbToGhostAngle()):cbToGhostAngle();
  const dirX=Math.cos(shotAngle),dirZ=Math.sin(shotAngle);
  if(camMode==='cue-eye'){const eb=s.cam3DDist,eh=18+eb*.22;camera3D.position.set(cb3.x-dirX*eb,TABLE_Y+eh,cb3.z-dirZ*eb);camera3D.lookAt(cb3.x+dirX*170,TABLE_Y+BALL_RADIUS_3D*.55,cb3.z+dirZ*170);}
  else{const cx=orbit.radius*Math.sin(orbit.phi)*Math.cos(orbit.theta),cy=orbit.radius*Math.cos(orbit.phi),cz=orbit.radius*Math.sin(orbit.phi)*Math.sin(orbit.theta);camera3D.position.set(cx,cy,cz);camera3D.lookAt(0,TABLE_Y,0);}
  renderer3D.render(scene3D,camera3D);
}

function resize3D(){if(!view3DReady)return;const wrap=document.getElementById('view3d-wrap'),w=wrap.clientWidth||680,h=wrap.clientHeight||300;renderer3D.setSize(w,h);camera3D.aspect=w/h;camera3D.updateProjectionMatrix();sync3D();}
window.addEventListener('resize',resize3D);

drawScene();
requestAnimationFrame(()=>{initThree();resize3D();sync3D();});
</script>
